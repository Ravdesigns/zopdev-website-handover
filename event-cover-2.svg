<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="600" fill="#0F0F12"/>
  <!-- gridlines -->
  <g stroke="#1F1F26" stroke-width="1">
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
  </g>
  <!-- FinOps roundtable · 3 trend lines representing the 3 panelists -->
  <path d="M 60 460 Q 150 380, 240 340 T 540 220" fill="none" stroke="#2A4494" stroke-width="3" opacity=".85"/>
  <path d="M 60 420 Q 180 360, 300 300 T 540 180" fill="none" stroke="#7FB236" stroke-width="3" opacity=".85"/>
  <path d="M 60 380 Q 200 280, 320 240 T 540 130" fill="none" stroke="#F58549" stroke-width="3"/>
  <!-- data points on the orange line -->
  <circle cx="60"  cy="380" r="6" fill="#F58549"/>
  <circle cx="180" cy="300" r="6" fill="#F58549"/>
  <circle cx="320" cy="240" r="6" fill="#F58549"/>
  <circle cx="450" cy="180" r="6" fill="#F58549"/>
  <circle cx="540" cy="130" r="6" fill="#F58549"/>
  <!-- axis labels (simple ticks) -->
  <g stroke="#3A3A46" stroke-width="1">
    <line x1="60"  y1="500" x2="60"  y2="510"/>
    <line x1="180" y1="500" x2="180" y2="510"/>
    <line x1="300" y1="500" x2="300" y2="510"/>
    <line x1="420" y1="500" x2="420" y2="510"/>
    <line x1="540" y1="500" x2="540" y2="510"/>
  </g>
  <line x1="60" y1="500" x2="540" y2="500" stroke="#3A3A46" stroke-width="1"/>
  <!-- corner brand mark -->
  <rect x="540" y="40" width="20" height="20" fill="#2A4494"/>
  <circle cx="550" cy="50" r="5" fill="#FFFFFF"/>
  <!-- live indicator -->
  <circle cx="60" cy="60" r="6" fill="#7FB236"/>
</svg>
