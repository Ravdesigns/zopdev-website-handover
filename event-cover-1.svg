<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="600" fill="#0F0F12"/>
  <!-- subtle grid -->
  <g stroke="#1F1F26" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
  </g>
  <!-- spot-fleet visualization · stacked instances -->
  <g transform="translate(80,200)">
    <rect x="0" y="0" width="48" height="120" fill="#F58549"/>
    <rect x="60" y="20" width="48" height="100" fill="#F58549" opacity=".75"/>
    <rect x="120" y="40" width="48" height="80" fill="#F58549" opacity=".55"/>
    <rect x="180" y="10" width="48" height="110" fill="#F58549" opacity=".70"/>
    <rect x="240" y="30" width="48" height="90" fill="#F58549" opacity=".50"/>
    <rect x="300" y="55" width="48" height="65" fill="#F58549" opacity=".40"/>
    <rect x="360" y="25" width="48" height="95" fill="#F58549" opacity=".60"/>
    <rect x="420" y="50" width="48" height="70" fill="#F58549" opacity=".35"/>
  </g>
  <!-- corner brand mark -->
  <rect x="540" y="40" width="20" height="20" fill="#2A4494"/>
  <circle cx="550" cy="50" r="5" fill="#FFFFFF"/>
  <!-- corner pulse -->
  <circle cx="60" cy="60" r="6" fill="#7FB236"/>
</svg>
