<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="600" fill="#0F0F12"/>
  <!-- subtle grid -->
  <g stroke="#1F1F26" stroke-width="1">
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
  </g>
  <!-- abstract city skyline silhouette · in-person SF meetup -->
  <g fill="#F58549">
    <rect x="40"  y="380" width="50" height="180"/>
    <rect x="100" y="320" width="60" height="240"/>
    <rect x="170" y="260" width="40" height="300"/>
    <rect x="220" y="200" width="70" height="360"/>
    <rect x="300" y="280" width="50" height="280"/>
    <rect x="360" y="180" width="60" height="380"/>
    <rect x="430" y="240" width="50" height="320"/>
    <rect x="490" y="300" width="70" height="260"/>
  </g>
  <!-- window dots overlay -->
  <g fill="#0F0F12" opacity=".55">
    <circle cx="125" cy="380" r="4"/><circle cx="145" cy="380" r="4"/>
    <circle cx="125" cy="420" r="4"/><circle cx="145" cy="420" r="4"/>
    <circle cx="125" cy="460" r="4"/><circle cx="145" cy="460" r="4"/>
    <circle cx="245" cy="280" r="4"/><circle cx="265" cy="280" r="4"/>
    <circle cx="245" cy="320" r="4"/><circle cx="265" cy="320" r="4"/>
    <circle cx="245" cy="360" r="4"/><circle cx="265" cy="360" r="4"/>
    <circle cx="385" cy="260" r="4"/><circle cx="405" cy="260" r="4"/>
    <circle cx="385" cy="300" r="4"/><circle cx="405" cy="300" r="4"/>
    <circle cx="385" cy="340" r="4"/><circle cx="405" cy="340" r="4"/>
  </g>
  <!-- moon over the city -->
  <circle cx="500" cy="120" r="32" fill="#7FB236"/>
  <circle cx="490" cy="115" r="28" fill="#0F0F12"/>
  <!-- corner brand mark -->
  <rect x="40" y="40" width="20" height="20" fill="#2A4494"/>
  <circle cx="50" cy="50" r="5" fill="#FFFFFF"/>
</svg>
